name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Harness core
        run: npm run harness:core

      - name: Harness eval
        run: npm run harness:eval

      - name: Harness UI
        run: npm run harness:ui

      - name: Upload harness artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-artifacts
          path: artifacts/harness/
