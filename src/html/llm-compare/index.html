<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="./styles.css" rel="stylesheet">
    <title>번역 비교</title>
</head>
<body>
    <div id="header">
        <h2>번역 비교 · 줄맞춤</h2>
        <div id="summary"></div>
        <div id="nav-toolbar">
            <button id="prevMismatchFileBtn" class="nav-btn" title="이전 불일치/미번역 파일">◀ 이전</button>
            <button id="nextMismatchFileBtn" class="nav-btn" title="다음 불일치/미번역 파일">다음 ▶</button>
            <span class="nav-separator">│</span>
            <button id="prevMismatchBlockBtn" class="nav-btn" title="이전 불일치 블록">▲ 블록</button>
            <button id="nextMismatchBlockBtn" class="nav-btn" title="다음 불일치 블록">▼ 블록</button>
        </div>
        <div id="file-toolbar">
            <input type="text" id="file-search" placeholder="파일명 검색..." />
            <label id="filter-mismatch-label">
                <input type="checkbox" id="filter-mismatch" /> 불일치만
            </label>
            <label id="filter-untranslated-label">
                <input type="checkbox" id="filter-untranslated" /> 미번역만
            </label>
            <span id="file-count"></span>
        </div>
        <div id="file-list-wrap">
            <div id="file-list"></div>
        </div>
    </div>
    <div id="compare-container">
        <div class="column" id="col-original">
            <div class="column-header">원본 (Extract_backup)</div>
            <div class="blocks" id="original-blocks"></div>
        </div>
        <div class="column" id="col-translated">
            <div class="column-header">번역 (Extract)</div>
            <div class="blocks" id="translated-blocks"></div>
        </div>
    </div>
    <div class="button-bar">
        <span id="save-status"></span>
        <span id="selection-count" class="selection-count"></span>
        <button id="retranslateSelBtn" class="btn btn-retranslate-sel" disabled>선택 블록 재번역</button>
        <button id="retranslateBtn" class="btn btn-retranslate" disabled>전체 재번역</button>
        <button id="saveBtn" class="btn btn-primary" disabled>저장</button>
        <button id="closeBtn" class="btn">닫기</button>
    </div>
    <script src="./script.js"></script>
</body>
</html>
