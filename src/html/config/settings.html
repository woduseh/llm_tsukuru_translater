<!DOCTYPE html>
<html>
    <head>
        <script src="../../lib/enlang/enlang.js"></script>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
        <link href="./styles.css" rel="stylesheet">
        <title>설정</title>
    </head>
    <body>
        <div id="container">
            <!-- General settings -->
            <div class="settings-group">
                <div class="group-title">일반</div>
                <div class="setting-item">
                    <label for="loadingText">진행도 퍼센트 표시</label>
                    <input type="checkbox" id="loadingText">
                </div>
                <div class="setting-item">
                    <label for="JsonChangeLine">적용 JSON에서 줄바꿈 사용</label>
                    <input type="checkbox" id="JsonChangeLine">
                </div>
                <div class="setting-item">
                    <label for="DoNotTransHangul">한글 문자열 번역하지 않기</label>
                    <input type="checkbox" id="DoNotTransHangul">
                </div>
                <div class="setting-item">
                    <label for="ExtractAddLine">내용 없는 문자열 추출 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="ExtractAddLine">
                </div>
            </div>

            <!-- LLM Translation Settings -->
            <div class="settings-group">
                <div class="group-title">LLM 번역</div>
                <div class="setting-item">
                    <label for="llmApiKey">Gemini API 키</label>
                    <input type="password" id="llmApiKey" class="text-input" placeholder="API 키">
                </div>
                <div class="setting-item">
                    <label for="llmModel">모델</label>
                    <input type="text" id="llmModel" class="text-input" list="modelList" placeholder="모델 이름">
                    <datalist id="modelList">
                        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                    </datalist>
                </div>
                <div class="setting-item">
                    <label for="llmSourceLang">원문 언어</label>
                    <select id="llmSourceLang" class="text-input">
                        <option value="ja">일본어</option>
                        <option value="en">영어</option>
                        <option value="zh-CN">중국어 간체</option>
                        <option value="zh-TW">중국어 정체</option>
                        <option value="fr">프랑스어</option>
                        <option value="es">스페인어</option>
                        <option value="ru">러시아어</option>
                        <option value="de">독일어</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="llmTargetLang">번역 언어</label>
                    <select id="llmTargetLang" class="text-input">
                        <option value="ko">한국어</option>
                        <option value="en">영어</option>
                        <option value="ja">일본어</option>
                        <option value="zh-CN">중국어 간체</option>
                        <option value="zh-TW">중국어 정체</option>
                        <option value="fr">프랑스어</option>
                        <option value="es">스페인어</option>
                        <option value="ru">러시아어</option>
                        <option value="de">독일어</option>
                        <option value="pt">포르투갈어</option>
                        <option value="it">이탈리아어</option>
                        <option value="th">태국어</option>
                        <option value="vi">베트남어</option>
                        <option value="ar">아랍어</option>
                        <option value="pl">폴란드어</option>
                        <option value="nl">네덜란드어</option>
                        <option value="tr">터키어</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="llmTranslationUnit">번역 단위</label>
                    <select id="llmTranslationUnit" class="text-input">
                        <option value="file">파일 단위</option>
                        <option value="chunk">청크 단위</option>
                    </select>
                </div>
                <div class="setting-item" id="chunkSizeGroup">
                    <label for="llmChunkSize">청크 크기</label>
                    <input type="number" id="llmChunkSize" class="text-input short" value="30" min="1" max="200">
                </div>
                <div class="setting-item">
                    <label for="llmMaxRetries">검증 재시도 <span class="hint">번역 검증 실패 시</span></label>
                    <input type="number" id="llmMaxRetries" class="text-input short" value="2" min="0" max="10">
                </div>
                <div class="setting-item">
                    <label for="llmMaxApiRetries">API 오류 재시도 <span class="hint">429/503 등</span></label>
                    <input type="number" id="llmMaxApiRetries" class="text-input short" value="5" min="0" max="20">
                </div>
                <div class="setting-item">
                    <label for="llmTimeout">API 타임아웃 (초) <span class="hint">큰 파일은 길게 설정</span></label>
                    <input type="number" id="llmTimeout" class="text-input short" value="600" min="30" max="3600">
                </div>
                <div class="textarea-label" style="margin-top:8px">추가 지시사항 <span class="hint">번역 스타일, 용어집, 기타 지시</span></div>
                <textarea id="llmCustomPrompt" spellcheck="false" placeholder="예: 존댓말을 사용하세요&#10;ひかり는 히카리로 번역하세요&#10;판타지 스타일로 번역하세요"></textarea>
            </div>

            <!-- Advanced settings -->
            <details>
                <summary>고급 설정</summary>
                <div class="warn-text">고급 설정 변경 시 번역에 문제가 생길 수 있습니다</div>

                <div class="setting-item">
                    <label for="onefile_src">별도 파일로 스크립트 추출 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="onefile_src">
                </div>
                <div class="setting-item">
                    <label for="onefile_note">별도 파일로 노트 추출 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="onefile_note">
                </div>
                <div class="setting-item">
                    <label for="ExternMsgJson">ExternMessage.csv 분리 추출 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="ExternMsgJson">
                </div>
                <div class="setting-item">
                    <label for="oneMapFile">Map 파일 하나로 만들기 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="oneMapFile">
                </div>
                <div class="setting-item">
                    <label for="formatNice">추출 시 구분을 편하게 만들기 <span class="tag">MV/MZ</span></label>
                    <input type="checkbox" id="formatNice">
                </div>
                <div class="setting-item">
                    <label for="HideExtractAll">모두 추출 숨기기 <span class="tag">Wolf</span></label>
                    <input type="checkbox" id="HideExtractAll">
                </div>

                <div class="settings-group" style="margin-top:12px">
                    <div class="textarea-label">추가 추출 코드 <span class="tag">MV/MZ</span></div>
                    <textarea id="extractPlus" spellcheck="false" placeholder="122&#10;300&#10;.."></textarea>
                </div>

                <div class="setting-item">
                    <label for="extractSomeScript">특정 문자열을 가진 스크립트/노트만 추출</label>
                    <input type="checkbox" id="extractSomeScript">
                </div>
                <textarea id="extractSomeScript2" class="invisible" spellcheck="false" placeholder="showtext&#10;maintext&#10;.."></textarea>
            </details>

            <div style="margin-top:12px">
                <button id="license" class="btn2">오픈소스 라이센스</button>
            </div>
        </div>

        <div class="button-bar">
            <button id="apply" class="btn btn-primary">적용</button>
            <button id="close" class="btn">취소</button>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
