<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="../../lib/enlang/enlang.js"></script>
  <link rel="stylesheet" href="../../lib/sweetalert2/css.css">
  <script src="../../lib/sweetalert2/main.js"></script>
  <link href="./styles/main.css" rel="stylesheet">
  <title>Tsukuru Extractor</title>
</head>
<body draggable="false">
  <!-- Titlebar -->
  <div id="loading_bar">
    <div id="border_r"></div>
    <div id="loading-text">0%</div>
    <button id="abort-llm-btn" style="display:none;">번역 중단</button>
    <button id="settings" class="titlebar-btn" data-tooltip="설정" data-tooltip-pos="bottom">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/></svg>
    </button>
    <div id="icon2" class="icon">&#x2013;</div>
    <div id="icon1" class="icon">&times;</div>
  </div>

  <div class="app-content">
    <!-- Folder selection -->
    <section class="section">
      <label class="section-label" id="fold" enlang="Data Folder:">프로젝트 폴더</label>
      <div class="folder-row">
        <input type="text" id="folder_input" class="input" placeholder="data 폴더 경로를 선택하세요">
        <button id="sel" class="btn-secondary" enlang="Select">찾아보기</button>
      </div>
    </section>

    <!-- Mode + Run -->
    <section class="section">
      <div class="mode-row">
        <div class="mode-tabs">
          <button class="mode-tab" id="ext" enlang="Extract" data-tooltip="게임 데이터에서&#10;텍스트를 추출합니다" data-tooltip-pos="bottom">추출</button>
          <button class="mode-tab" id="apply" enlang="Apply" data-tooltip="번역된 텍스트를&#10;게임에 적용합니다" data-tooltip-pos="bottom">적용</button>
        </div>
        <button class="btn-run" id="run">RUN</button>
      </div>
    </section>

    <!-- Options -->
    <section class="section options-section">
      <div class="options-grid hiddenc" id="c-ext">
        <button class="option-btn" id="ext_plugin" enlang="Extract Plugins" data-tooltip="플러그인 폴더의 .js 파일에서&#10;텍스트를 추출합니다">플러그인</button>
        <button class="option-btn" id="ext_src" enlang="Extract Scripts" data-tooltip="js 폴더의 스크립트 파일에서&#10;텍스트를 추출합니다">스크립트</button>
        <button class="option-btn" id="ext_note" enlang="Extract Memo" data-tooltip="이벤트의 노트/메모 필드도&#10;함께 추출합니다">노트 / 메모</button>
        <button class="option-btn" id="exJson" enlang="Extract nonstandard" data-tooltip="표준 RPG Maker 형식이 아닌&#10;JSON 파일에서도 텍스트를 추출합니다">비표준 리소스</button>
        <button class="option-btn" id="decryptImg" enlang="Decrypt Images" data-tooltip="암호화된 .rpgmvp/.png_&#10;이미지 파일을 복호화합니다">이미지 복호화</button>
        <button class="option-btn" id="decryptAudio" enlang="Decrypt Audios" data-tooltip="암호화된 .rpgmvo/.ogg_&#10;오디오 파일을 복호화합니다">오디오 복호화</button>
        <button class="option-btn" id="ext_javascript" enlang="Decrypt Javascript" data-tooltip="암호화된 JavaScript 파일을&#10;복호화합니다">자바스크립트</button>
      </div>
      <div class="options-grid hiddenc" id="c-app">
        <button class="option-btn" id="autoline" enlang="Auto Line" data-tooltip="번역된 텍스트가 대화창을&#10;넘지 않도록 자동으로&#10;줄바꿈을 삽입합니다">자동 줄바꿈</button>
        <button class="option-btn" id="instantapply" enlang="Instant Apply" data-tooltip="Completed 폴더 대신 바로 번역 파일을&#10;게임에 적용합니다">즉시 적용</button>
      </div>
    </section>

    <!-- Tools -->
    <section class="section" id="addons-block">
      <label class="section-label">도구</label>
      <div id="addons">
        <div class="tools-primary">
          <button class="tool-btn primary" id="eztrans" enlang="Translation" data-tooltip="Gemini AI를 사용하여&#10;추출된 텍스트를 자동 번역합니다" data-tooltip-pos="bottom">번역</button>
          <button class="tool-btn primary" id="llmCompare" enlang="Compare Translation" data-tooltip="번역 결과와 원본을&#10;나란히 비교하고&#10;줄바꿈을 수정합니다" data-tooltip-pos="bottom">번역 비교</button>
          <button class="tool-btn primary" id="jsonVerify" enlang="Verify JSON" data-tooltip="원본과 번역된 JSON 파일의&#10;구조를 비교하여 텍스트 밀림&#10;등의 문제를 검증하고 수정합니다" data-tooltip-pos="bottom">JSON 검증</button>
        </div>
        <div class="tools-secondary">
          <button class="tool-btn secondary" id="versionUp" enlang="Version-Up Tool" data-tooltip="게임의 새 버전이 출시되었을 때&#10;기존 번역을 유지하면서&#10;새 텍스트만 추출합니다" data-tooltip-pos="bottom">버전 업</button>
          <button class="tool-btn secondary" id="fontConfig" enlang="Change Font" data-tooltip="게임에서 사용하는&#10;폰트를 변경합니다" data-tooltip-pos="bottom">폰트</button>
          <button class="tool-btn secondary" id="toProject" enlang="Convert to Project" data-tooltip="배포용 게임을 RPG Maker&#10;에디터에서 열 수 있는&#10;프로젝트 형식으로 변환합니다" data-tooltip-pos="bottom">프로젝트 변환</button>
        </div>
      </div>
    </section>
  </div>

  <!-- Page tabs -->
  <div class="page-tabs">
    <div class="page-tab active">MV/MZ</div>
    <div class="page-tab" id="WolfBtn">Wolf RPG</div>
  </div>

  <script src="./renderer.bundle.js"></script>
  <script src="../tooltip.js"></script>
</body>
</html>
