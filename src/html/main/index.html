<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="../../lib/enlang/enlang.js"></script>
  <link rel="stylesheet" href="../../lib/sweetalert2/css.css">
  <script src="../../lib/sweetalert2/main.js"></script>
  <link href="./styles/main.css" rel="stylesheet">
  <title>Tsukuru Extractor</title>
</head>
<body draggable="false">
  <!-- Titlebar -->
  <div id="loading_bar">
    <div id="border_r"></div>
    <div id="loading-text">0%</div>
    <div id="icon2" class="icon">&#x2013;</div>
    <div id="icon1" class="icon">&times;</div>
  </div>

  <div class="app-content">
    <!-- Folder selection -->
    <section class="section">
      <label class="section-label" id="fold" enlang="Data Folder:">프로젝트 폴더</label>
      <div class="folder-row">
        <input type="text" id="folder_input" class="input" placeholder="data 폴더 경로를 선택하세요">
        <button id="sel" class="btn-secondary" enlang="Select">찾아보기</button>
      </div>
    </section>

    <!-- Mode + Run -->
    <section class="section">
      <div class="mode-row">
        <div class="mode-tabs">
          <button class="mode-tab" id="ext" enlang="Extract">추출</button>
          <button class="mode-tab" id="apply" enlang="Apply">적용</button>
        </div>
        <button class="btn-run" id="run">RUN</button>
      </div>
    </section>

    <!-- Options -->
    <section class="section options-section">
      <div class="options-grid hiddenc" id="c-ext">
        <button class="option-btn" id="ext_plugin" enlang="Extract Plugins">플러그인</button>
        <button class="option-btn" id="ext_src" enlang="Extract Scripts">스크립트</button>
        <button class="option-btn" id="ext_note" enlang="Extract Memo">노트 / 메모</button>
        <button class="option-btn" id="exJson" enlang="Extract nonstandard">비표준 리소스</button>
        <button class="option-btn" id="decryptImg" enlang="Decrypt Images">이미지 복호화</button>
        <button class="option-btn" id="decryptAudio" enlang="Decrypt Audios">오디오 복호화</button>
        <button class="option-btn" id="ext_javascript" enlang="Decrypt Javascript">자바스크립트</button>
      </div>
      <div class="options-grid hiddenc" id="c-app">
        <button class="option-btn" id="autoline" enlang="Auto Line">자동 줄바꿈</button>
        <button class="option-btn" id="instantapply" enlang="Instant Apply">즉시 적용</button>
      </div>
    </section>

    <!-- Tools -->
    <section class="section" id="addons-block">
      <label class="section-label">도구</label>
      <div id="addons">
        <div class="tools-grid">
          <button class="tool-btn" id="eztrans" enlang="LLM Translation">LLM 번역</button>
          <button class="tool-btn" id="versionUp" enlang="Version-Up Tool">버전 업</button>
          <button class="tool-btn" id="fontConfig" enlang="Change Font">폰트</button>
          <button class="tool-btn" id="toProject" enlang="Convert to Project">프로젝트 변환</button>
          <button class="tool-btn" id="settings" enlang="Config">설정</button>
        </div>
      </div>
    </section>

    <!-- Status hint -->
    <div class="status-bar">
      <span id="info"></span>
    </div>
  </div>

  <!-- Page tabs -->
  <div class="page-tabs">
    <div class="page-tab active">MV/MZ</div>
    <div class="page-tab" id="WolfBtn">Wolf RPG</div>
  </div>

  <button id="addons_btn" style="display:none" enlang="Wiki">도움말</button>
  <script src="./renderer.js"></script>
</body>
</html>
